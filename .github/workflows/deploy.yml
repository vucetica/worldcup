name: Build and deploy report

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild by hand from the Actions tab
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours: refreshes live results during the tournament

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer runs supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # build.js pulls groups + results live from ESPN itself. If the API is
      # unreachable it exits non-zero, so no new (empty) artifact is published
      # and the last good page stays live.
      - name: Build report
        run: node build.js

      - name: Stage site
        run: mkdir -p public && cp index.html public/

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
